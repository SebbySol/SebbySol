  <section class="photoshop-section">
        <h2 class="photoshop-title">Photoshop</h2>
        <div class="masonry" style="margin-top: 32px;">

          <div class="masonry-item card-hover-container" data-title="Amoebiasis" data-description="An educational infographic designed to explain Amoebiasis in a clear and visually engaging way. Featuring concise text, organized sections, and relevant imagery, the layout guides viewers through the disease’s causes, symptoms, transmission, and prevention. The design balances informative content with approachable visuals, making it accessible for a wide range of audiences.">
              <img src="amoeba.png" alt="Infographics" />
              <div class="card-hover-overlay">
                <div class="card-hover-content">
                  <span class="card-title">Amoebiasis</span>
                <button class="card-view-btn">View</button>
              </div>
            </div>
          </div>

          <div class="masonry-item card-hover-container" data-title="Linked" data-description="Linked">
              <img src="chains.png" alt="Linked" />
              <div class="card-hover-overlay">
                <div class="card-hover-content">
                  <span class="card-title">Linked</span>
                <button class="card-view-btn">View</button>
              </div>
            </div>
          </div>

          <div class="masonry-item card-hover-container" data-title="BMTH Poster" data-description="A bold tribute to Bring Me The Horizon, featuring live concert visuals, torn-paper effects, and striking red accents that capture the band’s raw energy and emotion.">
              <img src="BMTH.png" alt="BMTH" />
              <div class="card-hover-overlay">
                <div class="card-hover-content">
                  <span class="card-title">BMTH Poster</span>
                <button class="card-view-btn">View</button>
              </div>
            </div>
          </div>

          <div class="masonry-item card-hover-container" data-title="Luna" data-description="Luna">
              <img src="sema1.png" alt="Luna" />
              <div class="card-hover-overlay">
                <div class="card-hover-content">
                  <span class="card-title">Luna</span>
                <button class="card-view-btn">View</button>
              </div>
            </div>
          </div>

          <div class="masonry-item card-hover-container" data-title="Portrait of a Graduate" data-description="A clean, student-friendly banner designed during my internship for Richer Picture’s website, promoting a webinar titled How Digital Badges Bring the Portrait of a Graduate to Life. Created with elementary students in mind, the design uses simple, approachable visuals and clear typography to make the topic engaging and easy to understand while maintaining a professional, educational tone.">
            <img src="mobrp.png" alt="Luna" />
            <div class="card-hover-overlay">
              <div class="card-hover-content">
                <span class="card-title">Luna</span>
              <button class="card-view-btn">View</button>
            </div>
          </div>
        </div>

          <div class="masonry-item card-hover-container" data-title="Thom Yorke" data-description="The grainy, textured backdrop and layered typography give the image a raw, experimental feel much like Radiohead’s genre-defying sound. It’s the kind of portrait that doesn’t just show a musician, but encapsulates the restless creativity and refusal to conform that has defined Yorke’s career.">
            <img src="thom.png" alt="Luna" />
            <div class="card-hover-overlay">
              <div class="card-hover-content">
                <span class="card-title">Luna</span>
              <button class="card-view-btn">View</button>
            </div>
          </div>
        </div>

          <div class="masonry-item card-hover-container" data-title="Luna Turns Four" data-description="A whimsical yet spooky birthday poster created for my niece’s 4th birthday, inspired by The Nightmare Before Christmas. Set against a rich purple backdrop and adorned with beloved characters from the film, the design blends playful celebration with Tim Burton’s iconic gothic style. The typeface mirrors the movie’s distinctive lettering, creating a festive piece that captures both the eerie charm and joyful spirit of the occasion.">
              <img src="luna.png" alt="Luna" />
              <div class="card-hover-overlay">
                <div class="card-hover-content">
                  <span class="card-title">Luna</span>
                <button class="card-view-btn">View</button>
              </div>
            </div>
          </div>

          <div class="masonry-item card-hover-container" data-title="Orocan Tabo" data-description="A parody poster for Orocan Tabo inspired by the 28 film trilogy, playfully reimagined as 28 Years Later to mark the long-awaited sequel. Using a horror-themed design, gritty textures, and cinematic elements, the poster humorously highlights the product’s unmatched durability, suggesting it could survive even decades of apocalyptic chaos.">
              <img src="orocan_sample.jpg" alt="Orocan Tabo" />
              <div class="card-hover-overlay">
                <div class="card-hover-content">
                  <span class="card-title">Orocan Tabo</span>
                <button class="card-view-btn">View</button>
              </div>
            </div>
          </div>
          
       </div>
    </section>

  <section class="figma-section">
    <h2 class="figma-title">Figma</h2>
    <div class="figma-gallery">
      <div class="figma-gallery-row">
        
        <div class="figma-gallery-card card-hover-container" data-title="Harvest2Home" data-description="Harvest2Home seeks to connect farmers directly to
        consumers. The purpose of building Harvest2Home is
        to address challenges such as limited market
        access for farmers, inefficiencies in the supply
        chain, and the increasing demand for transparency
        and sustainability in food sourcing.">
          <img src="harvest.jpg" alt="Harvest2Home" />
          <div class="card-hover-overlay">
            <div class="card-hover-content">
              <span class="card-title">Harvest2Home</span>
              <button class="card-view-btn">View</button>
            </div>
          </div>
        </div>
        
        <div class="figma-gallery-card card-hover-container" data-title="TQC" data-description="
        TQC (The Queens Clinic) was built to modernize the clinic's operations by transitioning from
        traditional paper-based methods to a more efficient digital system. As the
        Web Designer and Front-end Developer, I was responsible for designing
        the user interfaces (UI) for both the client side and admin side of the
        system. My role involved creating intuitive, user-friendly designs that
        made it easy for staff to navigate the system and for patients to manage
        their appointments.">
          <img src="TQC.jpg" alt="TQC" />
          <div class="card-hover-overlay">
            <div class="card-hover-content">
              <span class="card-title">TQC</span>
              <button class="card-view-btn">View</button>
            </div>
          </div>
        </div>

        <div class="figma-gallery-card card-hover-container" data-title="Rakk Gears" data-description="
          For our e-commerce project, we chose Rakk Gears as
          our client and designed a sample website to showcase
          their innovative gaming products. I focused on creating
          sleek visuals and a user-friendly interface to highlight
          their commitment to delivering exceptional gear for the
          gaming community.">
          <img src="rakk.jpg" alt="Rakk Gears" />
          <div class="card-hover-overlay">
            <div class="card-hover-content">
              <span class="card-title">Rakk Gears</span>
              <button class="card-view-btn">View</button>
            </div>
          </div>
        </div>
        
        <div class="figma-gallery-card card-hover-container" data-title="SmartBudgetor" data-description="A web app where users can upload bank statements, input expenses, or connect mock bank data, and an AI agent analyzes their spending, gives budgeting advice, and answers financial questions.">
          <img src="SMARTBUDGETOR.png" alt="SmartBudgetor" />
          <div class="card-hover-overlay">
            <div class="card-hover-content">
              <span class="card-title">SmartBudgetor</span>
              <button class="card-view-btn">View</button>
            </div>
          </div>
        </div> 
      </div>
    </div>
